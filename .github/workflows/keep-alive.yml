name: Keep Alive Ping

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes 24/7
  workflow_dispatch: # Allows manual testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bot Endpoint
        run: |
          curl -f -s https://buddy-claw-universal.onrender.com/health || echo "Bot is sleeping, waking it up now..."
          curl -f -s https://buddy-claw-universal.onrender.com/health
