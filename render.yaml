services:
  # 1. Sarvam Proxy
  - type: web
    name: sarvam-proxy
    env: node
    plan: free
    rootDir: sarvam-proxy
    buildCommand: npm install
    startCommand: node adapter.js
    envVars:
      - key: PORT
        value: 3000
      - fromGroup: dostai-shared

  # 2. OpenClaw Service (Telegram Orchestrator)
  - type: web
    name: openclaw-service
    env: node
    plan: free
    rootDir: openclaw-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3001
      - fromGroup: dostai-shared
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SARVAM_PROXY_URL
        fromService:
          name: sarvam-proxy
          type: web
          property: host

  # 3. Ziva Service
  - type: web
    name: ziva-service
    env: node
    plan: free
    rootDir: ziva-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3006
      - fromGroup: dostai-shared

  # 4. Liam Service
  - type: web
    name: liam-service
    env: node
    plan: free
    rootDir: liam-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3007
      - fromGroup: dostai-shared

  # 5. Anime Service
  - type: web
    name: anime-service
    env: node
    plan: free
    rootDir: anime-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3008
      - fromGroup: dostai-shared

  # 6. Celeb Service
  - type: web
    name: celeb-service
    env: node
    plan: free
    rootDir: celeb-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3009
      - fromGroup: dostai-shared

  # 7. SafeSpace Service
  - type: web
    name: safespace-service
    env: node
    plan: free
    rootDir: safespace-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3010
      - fromGroup: dostai-shared

  # 8. MindReset Service
  - type: web
    name: mindreset-service
    env: node
    plan: free
    rootDir: mindreset-service
    buildCommand: npm install --prefix ../shared && npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3011
      - fromGroup: dostai-shared

  # 9. Web Frontend (Next.js)
  - type: web
    name: dostai-web
    env: node
    plan: free
    rootDir: web
    buildCommand: npm install --prefix ../shared && npm install && npm run build
    startCommand: npm run start
    envVars:
      - fromGroup: dostai-shared
      - key: SARVAM_PROXY_URL
        fromService:
          name: sarvam-proxy
          type: web
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
