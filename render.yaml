services:
  # 1. Buddy Claw Universal AI Bot Engine
  - type: web
    name: buddy-claw-universal
    env: node
    plan: free
    region: singapore # Optimized for Sarvam API (India)
#    rootDir: dostai # Not needed since the repo is the dostai folder
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_PROXY_URL
        value: https://api.sarvam.ai/v1/chat/completions # Standard upstream
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
