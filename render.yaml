    healthCheckPath: /health

  # 9. Web Frontend (Next.js)
  - type: web
    name: dostai-web
    env: node
    plan: free
    buildCommand: npm install --prefix shared && npm install --prefix web && npm run build --prefix web
    startCommand: npm start --prefix web
    envVars:
      - fromGroup: dostai-shared
      - key: SARVAM_PROXY_URL
        fromService:
          name: sarvam-proxy
          type: web
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
