services:
  # 1. DostAI Mono-Service (8 Backend Services in One)
  - type: web
    name: dostai-combined
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node combined-service.js
    envVars:
      - fromGroup: dostai-shared
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_PROXY_URL
        value: http://localhost:10000/v1/chat/completions # Render default port is 10000
    healthCheckPath: /health

  # 2. Web Frontend (Next.js)
  - type: web
    name: dostai-web
    env: node
    plan: free
    buildCommand: npm install --prefix web && npm run build --prefix web
    startCommand: npm start --prefix web
    envVars:
      - fromGroup: dostai-shared
      - key: SARVAM_PROXY_URL
        fromService:
          name: dostai-combined
          type: web
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
