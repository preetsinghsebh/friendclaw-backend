services:
  # 1. Sarvam Proxy
  - type: web
    name: sarvam-proxy
    env: node
    plan: free
    buildCommand: npm install --prefix shared && npm install --prefix sarvam-proxy
    startCommand: node sarvam-proxy/adapter.js
    envVars:
      - fromGroup: dostai-shared
      - key: SARVAM_API_KEY
        sync: false
    healthCheckPath: /health

  # 2. OpenClaw Service (Telegram Orchestrator)
  - type: web
    name: openclaw-service
    env: node
    plan: free
    buildCommand: npm install --prefix shared && npm install --prefix openclaw-service
    startCommand: node openclaw-service/src/index.js
    envVars:
      - key: PORT
        value: 3001
      - fromGroup: dostai-shared
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SARVAM_PROXY_URL
        value: sarvam-proxy
    healthCheckPath: /health

  # 3. Ziva Service
