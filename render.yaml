services:
  # 1. Sarvam Proxy
  - type: web
    name: sarvam-proxy
    env: node
    plan: free
    rootDir: sarvam-proxy
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3000

  # 2. OpenClaw Service (Telegram Orchestrator)
  - type: web
    name: openclaw-service
    env: node
    plan: free
    rootDir: openclaw-service
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SARVAM_PROXY_URL
        fromService:
          name: sarvam-proxy
          type: web
          property: host

  # 3. Ziva Service
  - type: web
